<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Icon Generator - SVG Geometric Icons</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:20px}
h1{text-align:center;padding:20px 0;font-size:1.8rem;background:linear-gradient(135deg,#e94560,#0f3460);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.app{display:grid;grid-template-columns:280px 1fr;gap:20px;margin-top:10px}
@media(max-width:768px){.app{grid-template-columns:1fr}.icons-grid{grid-template-columns:repeat(4,1fr)!important}}
.panel{background:#16213e;border-radius:12px;padding:20px}
.panel h3{margin-bottom:12px;color:#e94560;font-size:.95rem}
.control{margin-bottom:14px}
.control label{display:block;font-size:.8rem;color:#aaa;margin-bottom:4px}
.control input[type=color]{width:100%;height:36px;border:none;border-radius:6px;cursor:pointer;background:#0f3460}
.control input[type=range]{width:100%;accent-color:#e94560}
.control select{width:100%;padding:8px;background:#0f3460;color:#e0e0e0;border:1px solid #1a1a4e;border-radius:6px}
.val{float:right;color:#e94560;font-size:.8rem}
.icons-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.icon-btn{background:#0f3460;border:2px solid transparent;border-radius:8px;padding:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.icon-btn:hover{border-color:#e94560;transform:scale(1.05)}
.icon-btn.active{border-color:#e94560;background:#1a1a4e}
.icon-btn svg{width:28px;height:28px}
.preview-area{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px}
.preview-box{background:repeating-conic-gradient(#2a2a4e 0% 25%,#1a1a3e 0% 50%) 50%/20px 20px;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:40px;margin-bottom:20px}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;transition:.2s}
.btn-svg{background:#0f3460;color:#e0e0e0}.btn-svg:hover{background:#1a3a6e}
.btn-png{background:#e94560;color:#fff}.btn-png:hover{background:#c73650}
</style>
</head>
<body>
<div class="container">
<h1>AI Icon Generator</h1>
<div class="app">
<div class="panel" id="controls">
<h3>Select Icon</h3>
<div class="icons-grid" id="iconsGrid"></div>
<h3>Customize</h3>
<div class="control"><label>Fill Color</label><input type="color" id="fillColor" value="#e94560"></div>
<div class="control"><label>Stroke Color</label><input type="color" id="strokeColor" value="#ffffff"></div>
<div class="control"><label>Stroke Width <span class="val" id="swVal">2</span></label><input type="range" id="strokeWidth" min="0" max="20" value="2"></div>
<div class="control"><label>Icon Size <span class="val" id="sizeVal">128px</span></label><input type="range" id="iconSize" min="16" max="512" value="128"></div>
<h3>Background</h3>
<div class="control"><label>Shape</label><select id="bgShape"><option value="none">None</option><option value="circle">Circle</option><option value="square">Square</option><option value="rounded">Rounded Square</option></select></div>
<div class="control"><label>Background Color</label><input type="color" id="bgColor" value="#0f3460"></div>
</div>
<div class="panel">
<h3>Preview</h3>
<div class="preview-area">
<div class="preview-box" id="previewBox"></div>
<div class="btn-group">
<button class="btn btn-svg" onclick="exportSVG()">Export SVG</button>
<button class="btn btn-png" onclick="exportPNG()">Export PNG</button>
</div>
</div>
</div>
</div>
</div>
<script id="app-script">
const ICONS={
circle:'<circle cx="50" cy="50" r="40"/>',
square:'<rect x="10" y="10" width="80" height="80"/>',
roundedSq:'<rect x="10" y="10" width="80" height="80" rx="15"/>',
triangle:'<polygon points="50,10 90,90 10,90"/>',
diamond:'<polygon points="50,5 95,50 50,95 5,50"/>',
pentagon:'<polygon points="50,5 97,36 79,91 21,91 3,36"/>',
hexagon:'<polygon points="50,3 93,25 93,75 50,97 7,75 7,25"/>',
star:'<polygon points="50,5 61,35 95,35 68,57 79,90 50,70 21,90 32,57 5,35 39,35"/>',
star4:'<polygon points="50,2 62,38 98,50 62,62 50,98 38,62 2,50 38,38"/>',
heart:'<path d="M50,88C20,65 5,45 5,30A20,20 0 0 1 50,25A20,20 0 0 1 95,30C95,45 80,65 50,88Z"/>',
arrowUp:'<polygon points="50,10 85,55 65,55 65,90 35,90 35,55 15,55"/>',
arrowRight:'<polygon points="90,50 45,15 45,35 10,35 10,65 45,65 45,85"/>',
arrowDown:'<polygon points="50,90 85,45 65,45 65,10 35,10 35,45 15,45"/>',
arrowLeft:'<polygon points="10,50 55,15 55,35 90,35 90,65 55,65 55,85"/>',
lightning:'<polygon points="58,5 22,52 45,52 38,95 78,42 53,42"/>',
cloud:'<path d="M25,70A20,20 0 0 1 25,35A25,25 0 0 1 75,35A20,20 0 0 1 75,70Z"/>',
house:'<path d="M50,10L90,45 80,45 80,90 58,90 58,60 42,60 42,90 20,90 20,45 10,45Z"/>',
moon:'<path d="M60,15A35,35 0 1 0 60,85A28,28 0 1 1 60,15Z"/>',
eye:'<path d="M5,50Q25,15 50,15Q75,15 95,50Q75,85 50,85Q25,85 5,50Z"/><circle cx="50" cy="50" r="12"/>',
shield:'<path d="M50,8L90,25 90,55Q90,80 50,95Q10,80 10,55L10,25Z"/>',
bell:'<path d="M50,10A25,25 0 0 0 25,40L25,65 15,75 85,75 75,65 75,40A25,25 0 0 0 50,10ZM40,80A10,10 0 0 0 60,80"/>',
music:'<path d="M30,75A10,10 0 1 1 30,55L30,20L75,10L75,65A10,10 0 1 1 75,45L75,20L30,28L30,75Z"/>',
flag:'<path d="M20,10L20,90M20,10L80,25L20,45"/>',
cross:'<polygon points="35,10 65,10 65,35 90,35 90,65 65,65 65,90 35,90 35,65 10,65 10,35 35,35"/>',
check:'<polyline points="15,50 40,78 85,22" fill="none" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>',
};
let current='circle';
const $=id=>document.getElementById(id);
function init(){
const grid=$('iconsGrid');
Object.keys(ICONS).forEach(k=>{
const b=document.createElement('button');
b.className='icon-btn'+(k===current?' active':'');
b.title=k;
b.innerHTML='<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'+ICONS[k]+'</svg>';
b.onclick=()=>{grid.querySelectorAll('.icon-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');current=k;render()};
grid.appendChild(b);
});
['fillColor','strokeColor','strokeWidth','iconSize','bgShape','bgColor'].forEach(id=>{
$(id).addEventListener('input',render);
});
render();
}
function render(){
const size=+$('iconSize').value;
$('sizeVal').textContent=size+'px';
$('swVal').textContent=$('strokeWidth').value;
const fill=$('fillColor').value;
const stroke=$('strokeColor').value;
const sw=$('strokeWidth').value;
const bg=$('bgShape').value;
const bgc=$('bgColor').value;
let bgEl='';
if(bg==='circle')bgEl='<circle cx="50" cy="50" r="50" fill="'+bgc+'" stroke="none"/>';
else if(bg==='square')bgEl='<rect x="0" y="0" width="100" height="100" fill="'+bgc+'" stroke="none"/>';
else if(bg==='rounded')bgEl='<rect x="0" y="0" width="100" height="100" rx="18" fill="'+bgc+'" stroke="none"/>';
const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="'+size+'" height="'+size+'">'+bgEl+'<g fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'">'+ICONS[current]+'</g></svg>';
$('previewBox').innerHTML=svg;
}
function getSVGString(){
return $('previewBox').innerHTML;
}
function exportSVG(){
const blob=new Blob([getSVGString()],{type:'image/svg+xml'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='icon-'+current+'.svg';
a.click();
URL.revokeObjectURL(a.href);
}
function exportPNG(){
const size=+$('iconSize').value;
const svg=$('previewBox').querySelector('svg');
const data='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg.outerHTML)));
const img=new Image();
img.onload=()=>{
const c=document.createElement('canvas');
c.width=size;c.height=size;
const ctx=c.getContext('2d');
ctx.drawImage(img,0,0,size,size);
c.toBlob(blob=>{
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='icon-'+current+'.png';
a.click();
URL.revokeObjectURL(a.href);
},'image/png');
};
img.src=data;
}
init();
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130747" async data-cfasync="false"></script>
</body>
</html>
